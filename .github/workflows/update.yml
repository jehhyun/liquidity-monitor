name: Update Liquidity Monitor

on:
  schedule:
    # 8am ET = 12:00 UTC, 4pm ET = 20:00 UTC
    - cron: '0 12 * * 1-5'
    - cron: '0 20 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch FRED data and build dashboard
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: update liquidity monitor $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#111111">
<title>Fat Cat Capital — Liquidity Monitor</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#f0f0f0;font-family:system-ui,-apple-system,sans-serif;padding:20px 16px 60px;max-width:1100px;margin:0 auto}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.eyebrow{font-size:10px;color:#444;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
h1{font-size:22px;font-weight:700;letter-spacing:-.03em;line-height:1}
.live{font-size:11px;color:#97C459;margin-bottom:2px}
.ts{font-size:10px;color:#3a3a3a;line-height:1.6;text-align:right}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;font-size:14px;color:#444}
.err{background:#1a1212;border:1px solid #3a1a1a;border-radius:8px;padding:14px;color:#a55;font-size:12px;margin:20px 0}
.sec{margin-bottom:18px}
.sl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#3a3a3a;font-weight:600;border-bottom:1px solid #1a1a1a;padding-bottom:5px;margin-bottom:8px}
.g4{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
.g6{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:8px}
.card{background:#181818;border:1px solid #252525;border-radius:8px;padding:11px 13px;cursor:pointer;user-select:none}
.card.red{border-color:#3a1a1a;background:#1a1212}
.card.amb{border-color:#2e2800}
.card.grn{border-color:#1a2e1a}
.ct{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:6px}
.cl{font-size:10px;color:#666;line-height:1.3;flex:1}
.cc{font-size:9px;color:#3a3a3a;background:#111;padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.cv{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1;color:#f0f0f0;font-family:ui-monospace,'SF Mono',monospace;margin-bottom:4px}
.cv.sm{font-size:17px}
.cd{font-size:11px;min-height:14px}
.ci{display:none;font-size:11px;color:#666;line-height:1.55;margin-top:8px;padding-top:8px;border-top:1px solid #252525}
.ctog{text-align:right;font-size:9px;color:#2a2a2a;margin-top:3px}
.card.open .ci{display:block}
.bar{height:4px;border-radius:2px;background:#1a1a1a;overflow:hidden;margin-top:3px}
.bfill{height:4px;border-radius:2px}
.pills{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.pill{font-size:10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4px;padding:2px 8px;color:#888}
/* Changes */
.changes{background:#161616;border:1px solid #252525;border-radius:8px;padding:12px 14px;margin-bottom:16px}
.chg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-top:8px}
.chg-item{background:#111;border-radius:5px;padding:7px 9px}
.chg-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.chg-val{font-size:13px;font-weight:600;font-family:ui-monospace,'SF Mono',monospace}
.chg-delta{font-size:10px;margin-top:1px}
/* Regime */
.regime{background:#161616;border:1px solid #2a2a2a;border-radius:10px;padding:14px;margin-bottom:16px}
.scores{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-bottom:12px}
.sc{background:#111;border-radius:6px;padding:9px 11px;cursor:pointer;user-select:none}
.sc-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.sc-top{display:flex;align-items:baseline;gap:8px;margin-bottom:2px}
.sc-num{font-size:20px;font-weight:700;font-family:ui-monospace,'SF Mono',monospace}
.sc-trend{font-size:11px}
.sc-sub{font-size:10px;color:#3a3a3a;margin-bottom:5px}
.sc-decomp{display:none;margin-top:6px;padding-top:6px;border-top:1px solid #1a1a1a}
.sc.open .sc-decomp{display:block}
.dr{display:flex;justify-content:space-between;font-size:10px;color:#555;margin-bottom:3px}
.dr span:last-child{font-family:ui-monospace,'SF Mono',monospace}
/* Confidence */
.conf{background:#111;border-radius:6px;padding:9px 11px;margin-bottom:10px}
/* Trade table */
.ttable{width:100%;border-collapse:collapse;margin-top:8px}
.ttable th{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;text-align:left;padding:5px 8px;border-bottom:1px solid #1e1e1e}
.ttable td{font-size:11px;padding:6px 8px;border-bottom:1px solid #161616;color:#777;vertical-align:top}
.ttable td:first-child{color:#f0f0f0;font-weight:500;white-space:nowrap}
.ttable tr:last-child td{border-bottom:none}
.horizon{font-size:9px;color:#3a3a3a;margin-top:2px}
/* Counterargs */
.cargs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
/* Calendar */
.cal{background:#161616;border:1px solid #252525;border-radius:8px;padding:12px 14px;margin-bottom:16px}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;margin-top:8px}
.ci2{background:#111;border-radius:5px;padding:8px 10px;border-left:2px solid}
/* Net liq */
.nl{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer}
.nl-track{height:5px;background:#1e1e1e;border-radius:3px;position:relative;margin:6px 0}
.nl-fill{height:5px;border-radius:3px;position:absolute;top:0;left:0}
.nl-dot{width:9px;height:9px;border-radius:50%;position:absolute;top:-2px;transform:translateX(-50%);border:2px solid #111}
.nl.open .nl-detail{display:block}
.nl-detail{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #252525;font-size:11px;color:#666;line-height:1.6}
/* Korea gate */
.kgate{border:2px solid #3a1a1a;background:#1a1212;border-radius:8px;padding:12px 14px;margin-bottom:8px}
.kgate.open{border-color:#1a3a1a;background:#121a12}
/* Chain */
.chain{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.cc2{background:#181818;border:1px solid #252525;border-radius:6px;padding:9px 11px;cursor:pointer;user-select:none}
.cc2.warn{border-color:#3a1a1a}
.cc2.grn2{border-color:#1a2e1a}
.cc2.open .cc2-n{display:block}
.cc2-n{display:none;font-size:10px;color:#555;margin-top:5px;padding-top:5px;border-top:1px solid #1e1e1e;line-height:1.5}
/* Tags */
.tag{font-size:10px;padding:2px 8px;border-radius:4px;border:1px solid}
.footer-bar{font-size:9px;color:#3a3a3a;margin-top:16px;cursor:pointer}
.footer-detail{display:none;font-size:9px;color:#2e2e2e;margin-top:4px;line-height:1.8}
@media(max-width:600px){.g6,.chain{grid-template-columns:1fr 1fr}.scores,.chg-grid,.cargs{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"><div class="loading">Loading latest data…</div></div>

<script>
const C = { red:'#E24B4A', amber:'#EF9F27', green:'#97C459', grey:'#555' };
const col = k => C[k] || C.grey;

function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function tog(el){ el.classList.toggle('open'); const t=el.querySelector('.ctog'); if(t) t.innerHTML=el.classList.contains('open')?'&#9650;':'&#9660;' }
function stars(n){ return '★'.repeat(n)+'☆'.repeat(5-n) }

function render(d) {
  const meta = d.meta || {};
  const s = d.scores || {};
  const sc = (k,label,cadence,note) => {
    const x = s[k]||{};
    const tr = x.trend_wk>=0 ? `<span style="color:${C.green}">▲${Math.abs(x.trend_wk)} wk</span>` : `<span style="color:${C.red}">▼${Math.abs(x.trend_wk)} wk</span>`;
    const decomp = (x.decomp||[]).map(([lbl,v])=>`<div class="dr"><span>${esc(lbl)}</span><span style="color:${v>=0?C.green:C.red}">${v>=0?'+':''}${v}</span></div>`).join('');
    return `<div class="sc" onclick="this.classList.toggle('open')">
      <div class="sc-label">${esc(label)}</div>
      <div class="sc-top"><span class="sc-num" style="color:${col(x.color)}">${x.value}</span>${tr}</div>
      <div class="bar"><div class="bfill" style="width:${x.value}%;background:${col(x.color)}"></div></div>
      <div class="sc-sub">${esc(x.label||'')}</div>
      <div class="sc-decomp"><div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px">Contributors</div>${decomp}<div style="border-top:1px solid #1a1a1a;margin-top:5px;padding-top:5px"><div class="dr" style="font-weight:600"><span style="color:#aaa">Net score</span><span style="color:${col(x.color)}">${x.value} / 100</span></div></div></div>
    </div>`
  };

  const tags = Object.entries(s).map(([k,v])=>{
    const colors = {red:['#1a1212','#3a1a1a',C.red], amber:['#1a1a12','#3a3a1a',C.amber], green:['#121a12','#1a3a1a',C.green]};
    const [bg,bc,tc] = colors[v.color]||['#111','#252525',C.grey];
    const labelMap = {liquidity:'Liquidity',credit:'Credit',inflation:'Inflation',vol:'Vol'};
    return `<span class="tag" style="background:${bg};border-color:${bc};color:${tc}">${labelMap[k]||k}: ${esc(v.label)}</span>`
  }).join('');

  const tradeRows = (d.trade_table||[]).map(r=>`<tr>
    <td>${esc(r.theme)}</td>
    <td style="color:${col(r.signal_color)}">${esc(r.signal)}</td>
    <td>${r.conviction||'—'}<div class="bar"><div class="bfill" style="width:${(r.conviction||0)*10}%;background:${col(r.signal_color)}"></div></div></td>
    <td><div class="horizon">${esc(r.horizon)}</div></td>
    <td>${esc(r.rationale)}</td>
  </tr>`).join('');

  const ca = d.counterargs || {};
  const sup = (ca.supporting||[]).map(x=>`<div style="font-size:11px;color:#888;line-height:1.8">✓ ${esc(x)}</div>`).join('');
  const aga = (ca.against||[]).map(x=>`<div style="font-size:11px;color:#888;line-height:1.8">✗ ${esc(x)}</div>`).join('');

  const calCards = (d.catalysts||[]).map(c=>{
    const bc = {red:C.red, amber:C.amber, grey:'#3a3a3a'}[c.type_color]||'#3a3a3a';
    const tc = {red:C.red, amber:C.amber, grey:'#555'}[c.type_color]||'#555';
    const typeBg = {red:'#1a1212', amber:'#1a1a12', grey:'#161616'}[c.type_color]||'#161616';
    return `<div class="ci2" style="border-color:${bc}">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div style="font-size:10px;color:#555">${esc(c.date)} · ${c.days}d</div>
        <span style="font-size:8px;color:${tc};background:${typeBg};padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.04em">${esc(c.type)}</span>
      </div>
      <div style="font-size:12px;font-weight:600;color:#f0f0f0;margin:3px 0">${esc(c.event)}</div>
      <div style="font-size:11px;color:${bc}">${stars(c.stars)}</div>
      <div style="font-size:10px;color:#444;margin-top:3px;line-height:1.4">${esc(c.note)}</div>
    </div>`
  }).join('');

  const p = d.plumbing || {};
  const pCards = [
    { label:'Treasury General Account', cadence:'Weekly · H.4.1', val:`$${p.tga_b}B`, delta:p.tga_delta, color:p.tga_color, note:`Rebuilding toward ~$1T late July. Each $38B/wk drains reserves directly — no RRP buffer.` },
    { label:'Overnight Reverse Repo', cadence:'Daily · NY Fed', val:`$${p.rrp_b}B`, delta:p.rrp_delta, color:p.rrp_color, note:`Depleted from $2T+ pre-2022. TGA rebuild hits reserves directly without this cushion.` },
    { label:'Reserve Balances', cadence:'Weekly · H.4.1', val:`$${p.reserves_t}T`, delta:p.reserves_delta, color:p.reserves_color, note:`Crossed below $3T for the first time this cycle. $2.8T is the next watch level.` },
    { label:'SOFR', cadence:'Daily · 8am ET', val:`${p.sofr_pct}%`, delta:p.sofr_delta, color:p.sofr_color, note:`vs IORB 3.65%. Spike above IORB = repo stress signal. Currently clean.` }
  ].map(x=>`<div class="card ${x.color}" onclick="tog(this)">
    <div class="ct"><span class="cl">${x.label}</span><span class="cc">${x.cadence}</span></div>
    <div class="cv">${esc(x.val)}</div>
    <div class="cd" style="color:${col(x.color)}">${esc(x.delta)}</div>
    <div class="ci">${esc(x.note)}</div>
    <div class="ctog">▼</div>
  </div>`).join('');

  const dur = d.duration || {};
  const cv = d.curve || {};
  const fx = d.fx || {};
  const kg = d.korea_gate || {};
  const sm = d.semis || {};

  const condCard = (label, pass, val, threshold, note) => `<div style="background:${pass?'#121a12':'#1a1212'};border:1px solid ${pass?'#1a3a1a':'#3a1a1a'};border-radius:6px;padding:9px 11px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
      <div style="font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.06em">${esc(label)}</div>
      <div style="font-size:11px;font-weight:700;color:${pass?C.green:C.red}">${pass?'✓ PASS':'✗ FAIL'}</div>
    </div>
    <div style="font-size:13px;font-weight:600;color:#f0f0f0;margin-bottom:2px">${esc(val)}</div>
    <div style="font-size:10px;color:#3a3a3a">${esc(note)}</div>
  </div>`;

  const chainCards = (d.chain||[]).map(c=>`<div class="cc2 ${c.color==='warn'?'warn':c.color==='green'?'grn2':''}" onclick="this.classList.toggle('open')">
    <div style="font-size:9px;color:#444;letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px">${esc(c.ticker)}${c.flag?' ⚠':''}</div>
    <div style="font-size:17px;font-weight:700;color:#f0f0f0;font-family:ui-monospace,'SF Mono',monospace;letter-spacing:-.01em;margin-bottom:2px">$${typeof c.price==='number'&&c.price>1000?(c.price/1000).toFixed(2)+'K':c.price}</div>
    <div style="font-size:11px;color:${c.color==='green'?C.green:c.color==='amber'?C.amber:c.color==='warn'?C.red:C.grey}">${esc(c.delta)}</div>
    <div class="cc2-n">${esc(c.note)}</div>
  </div>`).join('');

  const chgItems = (d.changed_today||[]).map(x=>`<div class="chg-item">
    <div class="chg-label">${esc(x.label)}</div>
    <div class="chg-val" style="color:${col(x.color)}">${esc(x.value)}</div>
    <div class="chg-delta" style="color:${col(x.color)}">${esc(x.delta)}</div>
  </div>`).join('');

  document.getElementById('app').innerHTML = `
  <!-- HEADER -->
  <div class="hdr">
    <div><div class="eyebrow">Fat Cat Capital</div><h1>Liquidity pressure monitor</h1></div>
    <div><div class="live">● live</div><div class="ts">${esc(meta.pulled_at_cet||'')}<br>${esc(meta.source||'')}</div></div>
  </div>

  <!-- WHAT CHANGED -->
  <div class="changes">
    <div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.1em">▲ What changed today — ranked by macro impact</div>
    <div class="chg-grid">${chgItems}</div>
  </div>

  <!-- REGIME ENGINE -->
  <div class="regime">
    <div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;display:flex;justify-content:space-between"><span>Regime engine — decision layer</span><span style="color:#3a3a3a">${esc(meta.pulled_at_cet||'')}</span></div>
    <div class="scores">
      ${sc('liquidity','Liquidity score','','')}\n${sc('credit','Credit score','','')}\n${sc('inflation','Inflation score','','')}\n${sc('vol','Vol score','','')}
    </div>

    <!-- Confidence -->
    <div class="conf">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <span style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em">Regime confidence</span>
        <span style="font-size:9px;color:#3a3a3a">based on score agreement</span>
      </div>
      <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px">
        <div style="font-size:24px;font-weight:700;color:${C.amber};font-family:ui-monospace,'SF Mono',monospace">${d.regime_confidence}%</div>
        <div style="font-size:11px;color:#666">2 of 4 scores moving same direction — mixed regime, avoid large position changes</div>
      </div>
      <div class="bar"><div class="bfill" style="width:${d.regime_confidence}%;background:${C.amber}"></div></div>
    </div>

    <!-- Tags -->
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">${tags}</div>

    <!-- Bias -->
    <div style="background:#111;border-radius:6px;padding:9px 11px;font-size:11px;color:#666;line-height:1.55;margin-bottom:12px">
      <strong style="color:#aaa">Recommended bias:</strong> ${esc(d.bias||'')}
    </div>

    <!-- Trade table -->
    <!-- Sector Rotation Engine (Point 6) -->
    ${(()=>{
      const sr = d.sector_rotation || {};
      const ao = sr.actionable_output || {};
      const regimeColors = {'liquidity_expansion':C.green,'disinflationary_slowdown':C.green,'recession':C.amber,'inflation_reacceleration':C.amber,'liquidity_shock':C.red};
      const entries = Object.entries(sr.regime_scores||{});
      const sorted = entries.sort((a,b)=>b[1].score-a[1].score);
      return `<div style="margin-bottom:12px">
        <div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Sector rotation engine</div>
        <div style="background:#111;border-radius:6px;padding:9px 11px;margin-bottom:6px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px">
            <span style="font-size:12px;font-weight:600;color:${C.amber}">${esc(sr.current_regime||'Unknown')}</span>
            <span style="font-size:10px;color:#444">${esc(sr.confidence||'')}</span>
          </div>
          <div style="font-size:11px;color:#666;margin-bottom:8px">${esc(sr.actionable_output&&sr.actionable_output.likely_rotation||'')}</div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:4px">
            ${sorted.slice(0,4).map(([k,v])=>`<div style="background:#181818;border-radius:4px;padding:5px 8px;border-left:2px solid ${regimeColors[k]||C.grey}">
              <div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:.04em">${k.replace(/_/g,' ')}</div>
              <div style="font-size:10px;color:#888;line-height:1.4;margin-top:2px">${esc(v.match||'')}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>`;
    })()}

    <div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px">Trade implications</div>
    <table class="ttable">
      <thead><tr><th>Theme</th><th>Signal</th><th>Conv.</th><th>Horizon</th><th>Rationale</th></tr></thead>
      <tbody>${tradeRows}</tbody>
    </table>

    <!-- Counterarguments -->
    <div style="margin-top:12px">
      <div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Counterarguments — stress-testing the ${esc(ca.thesis||'duration')} thesis</div>
      <div class="cargs">
        <div style="background:#121a12;border:1px solid #1a3a1a;border-radius:6px;padding:10px 12px">
          <div style="font-size:10px;color:${C.green};text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Supporting</div>${sup}
        </div>
        <div style="background:#1a1212;border:1px solid #3a1a1a;border-radius:6px;padding:10px 12px">
          <div style="font-size:10px;color:${C.red};text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Against</div>${aga}
        </div>
      </div>
      <div style="font-size:10px;color:#555;line-height:1.6;margin-top:6px;background:#111;border-radius:5px;padding:8px 11px">
        <strong style="color:#888">Read:</strong> ${esc(ca.read||'')}
      </div>
    </div>
  </div>

  <!-- EVENT CALENDAR -->
  <div class="cal">
    <div style="font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.1em">Upcoming catalysts</div>
    <div class="cal-grid">${calCards}</div>
  </div>

  <!-- NET LIQUIDITY -->
  <div class="sec">
    <div class="sl">Fed net liquidity — primary signal</div>
    <div class="nl" onclick="this.classList.toggle('open')">
      <div style="font-size:9px;color:#3a3a3a;font-family:ui-monospace,'SF Mono',monospace;margin-bottom:6px">Net Liquidity = WALCL $${p.walcl_b}B − TGA $${p.tga_b}B − RRP $${p.rrp_b}B</div>
      <div style="font-size:30px;font-weight:700;color:#f0f0f0;font-family:ui-monospace,'SF Mono',monospace;letter-spacing:-.02em">$${d.plumbing.net_liquidity_t}T</div>
      <div style="font-size:11px;color:${C.red};margin:3px 0 8px">↓ declining — TGA rebuild + QT compounding simultaneously</div>

    <div style="font-size:14px;font-weight:600;color:${C.amber};margin-bottom:4px">Net liquidity $${p.net_liquidity_t}T &amp; falling | TGA $${p.tga_b}B → ~$1T late July | QRA Aug 5</div>
    <div style="font-size:11px;color:#555;line-height:1.6">Jul–Sep window is active not approaching. WALCL shrinking, TGA rebuilding $38B/wk, RRP depleted. H.4.1 <strong style="color:#aaa">Jul 2</strong> is next critical data point. Oil bounce today is the primary risk to the PCE peak / duration relief thesis. Treasury QRA <strong style="color:${C.amber}">Aug 5</strong> is the structural anchor.</div>

  <div class="footer-bar" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='block'?'none':'block'">ⓘ Data sources</div>
  <div class="footer-detail">
    FRED: WALCL · WTREGEN · RRPONTSYD · WRESBAL · SOFR · BAMLH0A0HYM2 (H.4.1 weekly) | TradingView "Liquidity Monitor - Jae" (~35 symbols) | Net Liq = WALCL−TGA−RRP · US/JP spread calculated live · SOXX/SPY calculated · Regime confidence = % score agreement | Dashboard reads data/latest.json on load — Cowork writes JSON only, never HTML
  </div>`;
}

async function load() {
  try {
    const r = await fetch('data/latest.json?v=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="hdr"><div><div class="eyebrow">Fat Cat Capital</div><h1>Liquidity pressure monitor</h1></div></div>
      <div class="err">Failed to load latest.json: ${esc(e.message)}<br><br>
      This usually means the data file hasn't been pushed yet by Cowork, or there's a network issue.<br>
      Cowork writes <code>docs/data/latest.json</code> on each scheduled run — check that the run completed successfully.</div>`;
  }
}

load();
</script>
